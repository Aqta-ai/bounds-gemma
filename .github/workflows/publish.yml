name: Publish to npm

# Trigger:
#   - On a release tag like `v0.1.1` (the canonical path: GitHub Releases UI
#     or `git tag v0.1.1 && git push --tags`).
#   - Manual run via the Actions tab (workflow_dispatch) for backfill or
#     republish-after-yank.
on:
  release:
    types: [published]
  workflow_dispatch:

# OIDC trusted publishing: GitHub mints a short-lived JWT, npm verifies it
# against the trusted-publisher configuration on the package page. No long-
# lived NPM_TOKEN secret is required, ever. The `id-token: write` permission
# is what unlocks the OIDC minting.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node 20 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (16 parser unit tests)
        run: npm test

      - name: Build dist/
        run: npm run build

      - name: Verify version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      # Try OIDC trusted publishing first (zero secrets). If npm's
      # Trusted Publisher config drifts from the workflow claims it
      # returns 404; in that case fall back to a Classic Automation
      # Token stored as NPM_TOKEN. Either path succeeds.
      - name: Publish to npm (OIDC with provenance)
        id: oidc_publish
        continue-on-error: true
        run: npm publish --provenance --access public

      - name: Publish to npm (NPM_TOKEN fallback)
        if: steps.oidc_publish.outcome == 'failure' && env.NPM_TOKEN != ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "OIDC publish failed (likely Trusted Publisher config drift)."
          echo "Falling back to NPM_TOKEN secret."
          npm publish --access public

      - name: Fail if neither path published
        if: steps.oidc_publish.outcome == 'failure' && env.NPM_TOKEN == ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::error::OIDC publish failed and no NPM_TOKEN secret is set."
          echo "Fix one of:"
          echo "  a) npm UI: bounds-gemma > Settings > Trusted Publishers > confirm Aqta-ai/bounds-gemma + publish.yml"
          echo "  b) Add NPM_TOKEN repo secret (Classic Automation token)"
          exit 1
